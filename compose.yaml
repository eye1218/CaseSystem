x-app-environment: &app-environment
  CASESYSTEM_ENVIRONMENT: ${CASESYSTEM_ENVIRONMENT:-docker}
  CASESYSTEM_COOKIE_SECURE: ${CASESYSTEM_COOKIE_SECURE:-true}
  CASESYSTEM_JWT_SECRET_KEY: ${CASESYSTEM_JWT_SECRET_KEY:-change-me-in-production-at-least-32-bytes}
  CASESYSTEM_REPORT_STORAGE_DIR: ${CASESYSTEM_REPORT_STORAGE_DIR:-/app/.runtime/report-storage}
  CASESYSTEM_DATABASE_URL: ${CASESYSTEM_DATABASE_URL:-}
  CASESYSTEM_CELERY_BROKER_URL: redis://redis:6379/0
  CASESYSTEM_CELERY_RESULT_BACKEND: redis://redis:6379/1
  CASESYSTEM_CELERY_TASK_ALWAYS_EAGER: "false"
  CASESYSTEM_CELERY_TASK_EAGER_PROPAGATES: "false"
  CASESYSTEM_CELERY_EVENT_SWEEP_INTERVAL_SECONDS: ${CASESYSTEM_CELERY_EVENT_SWEEP_INTERVAL_SECONDS:-30}
  CASESYSTEM_REALTIME_REDIS_URL: redis://redis:6379/2
  CASESYSTEM_TICKET_CACHE_REDIS_URL: redis://redis:6379/3
  CASESYSTEM_TICKET_CACHE_TTL_SECONDS: ${CASESYSTEM_TICKET_CACHE_TTL_SECONDS:-60}
  CASESYSTEM_SMTP_HOST: ${CASESYSTEM_SMTP_HOST:-}
  CASESYSTEM_SMTP_PORT: ${CASESYSTEM_SMTP_PORT:-25}
  CASESYSTEM_SMTP_USERNAME: ${CASESYSTEM_SMTP_USERNAME:-}
  CASESYSTEM_SMTP_PASSWORD: ${CASESYSTEM_SMTP_PASSWORD:-}
  CASESYSTEM_SMTP_FROM_EMAIL: ${CASESYSTEM_SMTP_FROM_EMAIL:-noreply@casesystem.local}
  CASESYSTEM_SMTP_USE_SSL: ${CASESYSTEM_SMTP_USE_SSL:-false}
  CASESYSTEM_SMTP_STARTTLS: ${CASESYSTEM_SMTP_STARTTLS:-false}
  CASESYSTEM_SQLITE_SOURCE_PATH: ${CASESYSTEM_SQLITE_SOURCE_PATH:-/workspace/casesystem.db}
  CASESYSTEM_ALLOWED_ORIGINS: ${CASESYSTEM_ALLOWED_ORIGINS:-["https://localhost","https://127.0.0.1"]}

x-app-service: &app-service
  build:
    context: .
    dockerfile: Dockerfile
  image: casesystem-app:local
  env_file:
    - .env.docker
  environment: *app-environment
  volumes:
    - runtime-data:/app/.runtime
    - ./:/workspace
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-casesystem}
      POSTGRES_USER: ${POSTGRES_USER:-casesystem}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-db-password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  bootstrap:
    <<: *app-service
    profiles: ["init"]
    restart: "no"
    command: ["python", "/workspace/docker/bootstrap_runtime.py"]
    volumes:
      - runtime-data:/app/.runtime
      - ./:/workspace:ro
    depends_on:
      postgres:
        condition: service_healthy

  api:
    <<: *app-service
    restart: unless-stopped
    command: ["/workspace/docker/api-entrypoint.sh"]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8010/healthz', timeout=5).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro

  worker:
    <<: *app-service
    restart: unless-stopped
    command: ["/workspace/docker/worker-entrypoint.sh"]

  beat:
    <<: *app-service
    restart: unless-stopped
    command: ["/workspace/docker/beat-entrypoint.sh"]

volumes:
  postgres-data:
  redis-data:
  runtime-data:
